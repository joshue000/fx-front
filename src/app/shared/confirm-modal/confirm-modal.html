<div class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="confirm-modal-title">
  <div class="modal">
    <h2 id="confirm-modal-title" class="modal__title">{{ 'confirmModal.title' | translate }}</h2>
    <p class="modal__message">{{ message }}</p>
    <div class="modal__actions">
      <button
        class="modal__btn modal__btn--cancel"
        type="button"
        [attr.aria-label]="'confirmModal.cancel' | translate"
        (click)="onCancel()"
      >
        {{ 'confirmModal.cancel' | translate }}
      </button>
      <button
        class="modal__btn modal__btn--confirm"
        type="button"
        [attr.aria-label]="'confirmModal.confirm' | translate"
        (click)="onConfirm()"
      >
        {{ 'confirmModal.confirm' | translate }}
      </button>
    </div>
  </div>
</div>

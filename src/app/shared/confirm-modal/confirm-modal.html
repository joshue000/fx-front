<div class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="confirm-modal-title">
  <div class="modal">
    <h2 id="confirm-modal-title" class="modal__title">Confirm Action</h2>
    <p class="modal__message">{{ message }}</p>
    <div class="modal__actions">
      <button
        class="modal__btn modal__btn--cancel"
        type="button"
        aria-label="Cancel and close dialog"
        (click)="onCancel()"
      >
        Cancel
      </button>
      <button
        class="modal__btn modal__btn--confirm"
        type="button"
        aria-label="Confirm action"
        (click)="onConfirm()"
      >
        Confirm
      </button>
    </div>
  </div>
</div>

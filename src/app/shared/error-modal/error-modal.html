<div class="modal-backdrop" role="alertdialog" aria-modal="true" aria-labelledby="error-modal-title">
  <div class="modal modal--error">
    <div class="modal__icon" aria-hidden="true">
      <i class="fa-solid fa-circle-exclamation"></i>
    </div>
    <h2 id="error-modal-title" class="modal__title">Something went wrong</h2>
    <p class="modal__message">{{ message }}</p>
    <div class="modal__actions">
      <button
        class="modal__btn modal__btn--dismiss"
        type="button"
        aria-label="Close error dialog"
        (click)="onDismiss()"
      >
        Close
      </button>
    </div>
  </div>
</div>

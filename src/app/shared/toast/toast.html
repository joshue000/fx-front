<div class="toast" role="status" aria-live="polite">
  <i class="fa-solid fa-circle-check toast__icon" aria-hidden="true"></i>
  <span class="toast__message">{{ message }}</span>
  <button class="toast__close" aria-label="Dismiss notification" (click)="dismiss()">
    <i class="fa-solid fa-xmark" aria-hidden="true"></i>
  </button>
</div>
